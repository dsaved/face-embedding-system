# Production Docker Compose with Full ML Capabilities
# Face Vector Embedding System - Enhanced Production Setup

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    container_name: face_postgres_prod
    environment:
      POSTGRES_DB: face_db_prod
      POSTGRES_USER: face_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - face_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face_user -d face_db_prod"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: face_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - face_network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Face Embedding API with Full ML Capabilities
  face_api:
    build:
      context: .
      dockerfile: Dockerfile.full
    container_name: face_api_prod
    environment:
      - DATABASE_URL=postgresql://face_user:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/face_db_prod
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
      - DEBUG=False
      - FACE_DETECTION_MODEL=mtcnn
      - FACE_ENCODING_MODEL=facenet
      - UPLOAD_FOLDER=/app/uploads
      - FAISS_INDEX_PATH=/app/data/face_index.faiss
      - MODEL_PATH=/app/models
      - MAX_WORKERS=4
      - WORKER_TIMEOUT=120
      - MAX_REQUESTS_PER_WORKER=1000
    ports:
      - "8080:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - face_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Background Task Worker (for async processing)
  face_worker:
    build:
      context: .
      dockerfile: Dockerfile.full
    container_name: face_worker_prod
    environment:
      - DATABASE_URL=postgresql://face_user:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/face_db_prod
      - REDIS_URL=redis://redis:6379/0
      - FACE_DETECTION_MODEL=mtcnn
      - FACE_ENCODING_MODEL=facenet
      - UPLOAD_FOLDER=/app/uploads
      - FAISS_INDEX_PATH=/app/data/face_index.faiss
      - MODEL_PATH=/app/models
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - face_network
    restart: unless-stopped
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info", "--concurrency=2"]

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: face_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - face_network
    restart: unless-stopped
    profiles: ["monitoring"]

  # Grafana Dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: face_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - face_network
    restart: unless-stopped
    profiles: ["monitoring"]

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: face_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - face_api
    networks:
      - face_network
    restart: unless-stopped
    profiles: ["proxy"]

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  face_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
