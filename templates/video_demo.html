<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Face Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #2d2d2d;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00ff88;
            margin-bottom: 5px;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .header p {
            color: #aaa;
            font-size: 1em;
        }

        .video-container {
            position: relative;
            margin: 0 auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .video-canvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
            -webkit-transform: scaleX(-1);
            transform: scaleX(-1);
        }

        .status {
            text-align: center;
            margin-bottom: 15px;
        }

        .status-indicator {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .status-connected {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .status-disconnected {
            background: #ff4757;
            color: #fff;
        }

        .status-processing {
            background: #ffa502;
            color: #000;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding: 15px;
            background: #3d3d3d;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff88;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
        }

        .face-overlay {
            position: absolute;
            border: 3px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 5px;
            pointer-events: none;
        }

        .face-label {
            position: absolute;
            background: rgba(0, 255, 136, 0.9);
            color: #000;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: none;
            white-space: nowrap;
            transform: translateY(-35px);
        }

        .face-label.unknown {
            background: rgba(255, 71, 87, 0.9);
            color: #fff;
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Real-Time Face Recognition</h1>
            <p>AI-powered face detection and identification system</p>
        </div>

        <div class="status">
            <span id="status-indicator" class="status-indicator status-disconnected">
                Initializing
            </span>
        </div>

        <div class="video-container">
            <video id="video" class="video-canvas" height="480" autoplay muted></video>
            <canvas id="canvas" class="video-canvas hidden" height="480"></canvas>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span id="faces-detected" class="stat-value">0</span>
                <span class="stat-label">Faces Detected</span>
            </div>
            <div class="stat-item">
                <span id="identified-count" class="stat-value">0</span>
                <span class="stat-label">Identified</span>
            </div>
            <div class="stat-item">
                <span id="fps-counter" class="stat-value">0</span>
                <span class="stat-label">FPS</span>
            </div>
        </div>

        <div id="error-container"></div>
    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script>
        class OptimizedFaceRecognition {
            constructor() {
                this.socket = null;
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.statusIndicator = document.getElementById('status-indicator');
                this.facesDetectedEl = document.getElementById('faces-detected');
                this.identifiedCountEl = document.getElementById('identified-count');
                this.fpsCounterEl = document.getElementById('fps-counter');
                this.errorContainer = document.getElementById('error-container');

                this.isProcessing = false;
                this.lastFrameTime = 0;
                this.frameCount = 0;
                this.fpsStartTime = Date.now();
                this.currentFaces = [];
                this.frameRate = 10; // Optimal frame rate for real-time processing
                this.confidenceThreshold = 0.6;

                this.init();
            }

            async init() {
                try {
                    await this.initCamera();
                    this.initSocket();
                    this.startProcessing();
                } catch (error) {
                    this.showError('Failed to initialize camera: ' + error.message);
                }
            }

            async initCamera() {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 30 }
                    }
                });
                this.video.srcObject = stream;

                return new Promise((resolve) => {
                    this.video.onloadedmetadata = () => {
                        resolve();
                    };
                });
            }

            initSocket() {
                this.socket = io('/', {
                    transports: ['websocket'],
                    upgrade: false
                });

                this.socket.on('connect', () => {
                    this.updateStatus('connected', 'Connected');
                    console.log('Connected to video recognition service');
                });

                this.socket.on('disconnect', () => {
                    this.updateStatus('disconnected', 'Disconnected');
                    console.log('Disconnected from video recognition service');
                });

                this.socket.on('face_recognition_result', (data) => {
                    this.handleRecognitionResult(data);
                });

                this.socket.on('error', (error) => {
                    console.error('Socket error:', error);
                    this.showError('Connection error: ' + error.message);
                });
            }

            startProcessing() {
                const processFrame = () => {
                    if (!this.video.videoWidth || this.isProcessing) {
                        requestAnimationFrame(processFrame);
                        return;
                    }

                    const now = Date.now();
                    const timeSinceLastFrame = now - this.lastFrameTime;

                    if (timeSinceLastFrame >= (1000 / this.frameRate)) {
                        this.captureAndProcessFrame();
                        this.lastFrameTime = now;
                        this.updateFPS();
                    }

                    requestAnimationFrame(processFrame);
                };

                processFrame();
            }

            captureAndProcessFrame() {
                if (!this.socket || !this.socket.connected) {
                    return;
                }

                this.isProcessing = true;
                this.updateStatus('processing', 'Processing');

                // Capture frame
                this.canvas.width = this.video.videoWidth;
                this.canvas.height = this.video.videoHeight;
                this.ctx.drawImage(this.video, 0, 0);

                // Convert to base64
                const frameData = this.canvas.toDataURL('image/jpeg', 0.8);

                // Send for processing with optimal settings
                this.socket.emit('process_frame', {
                    frame_data: frameData,
                    confidence_threshold: this.confidenceThreshold,
                    detection_model: 'hybrid', // Use best combined model
                    options: {
                        detect_faces: true,
                        identify_faces: true,
                        track_faces: true,
                        return_embeddings: false
                    }
                });
            }

            handleRecognitionResult(data) {
                this.isProcessing = false;
                this.updateStatus('connected', 'Connected');

                if (data.success && data.faces) {
                    this.currentFaces = data.faces;
                    this.updateStats(data.faces);
                    this.drawFaceOverlays(data.faces);
                } else if (data.error) {
                    console.error('Recognition error:', data.error);
                }
            }

            updateStats(faces) {
                const totalFaces = faces.length;
                const identifiedFaces = faces.filter(face =>
                    face.identification && face.identification.person_id !== 'unknown'
                ).length;

                this.facesDetectedEl.textContent = totalFaces;
                this.identifiedCountEl.textContent = identifiedFaces;
            }

            drawFaceOverlays(faces) {
                // Clear existing overlays
                document.querySelectorAll('.face-overlay').forEach(el => el.remove());

                faces.forEach((face, index) => {
                    this.createFaceOverlay(face, index);
                });
            }

            createFaceOverlay(face, index) {
                const bbox = face.bbox;
                const identification = face.identification;

                // Calculate position relative to video element
                const videoRect = this.video.getBoundingClientRect();
                const containerRect = this.video.parentElement.getBoundingClientRect();

                const scaleX = videoRect.width / this.video.videoWidth;
                const scaleY = videoRect.height / this.video.videoHeight;

                const x = bbox.x * scaleX;
                const y = bbox.y * scaleY;
                const width = bbox.width * scaleX;
                const height = bbox.height * scaleY;

                // Create overlay element
                const overlay = document.createElement('div');
                overlay.className = 'face-overlay';
                overlay.style.left = x + 'px';
                overlay.style.top = y + 'px';
                overlay.style.width = width + 'px';
                overlay.style.height = height + 'px';

                // Create label
                const label = document.createElement('div');
                label.className = 'face-label';

                if (identification && identification.person_id !== 'unknown') {
                    const confidence = Math.round(identification.similarity_score * 100);
                    label.textContent = `${identification.person_name} (${confidence}%)`;
                } else {
                    label.className += ' unknown';
                    label.textContent = 'Unknown';
                }

                overlay.appendChild(label);
                this.video.parentElement.appendChild(overlay);
            }

            updateFPS() {
                this.frameCount++;
                const now = Date.now();
                const timeDiff = now - this.fpsStartTime;

                if (timeDiff >= 1000) {
                    const fps = Math.round((this.frameCount * 1000) / timeDiff);
                    this.fpsCounterEl.textContent = fps;
                    this.frameCount = 0;
                    this.fpsStartTime = now;
                }
            }

            updateStatus(status, text) {
                this.statusIndicator.className = `status-indicator status-${status}`;
                this.statusIndicator.textContent = text;
            }

            showError(message) {
                this.errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
                setTimeout(() => {
                    this.errorContainer.innerHTML = '';
                }, 5000);
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new OptimizedFaceRecognition();
        });
    </script>
</body>

</html>
