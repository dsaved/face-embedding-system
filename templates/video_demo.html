<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Face Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #2d2d2d;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00ff88;
            margin-bottom: 5px;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .header p {
            color: #aaa;
            font-size: 1em;
        }

        .video-container {
            position: relative;
            margin: 0 auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 640px;
            min-height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-canvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
            -webkit-transform: scaleX(-1);
            transform: scaleX(-1);
            display: block;
            max-width: 640px;
            background: #000;
        }

        .status {
            text-align: center;
            margin-bottom: 15px;
        }

        .status-indicator {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .status-connected {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .status-disconnected {
            background: #ff4757;
            color: #fff;
        }

        .status-processing {
            background: #ffa502;
            color: #000;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding: 15px;
            background: #3d3d3d;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff88;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
        }

        .face-overlay {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            /* Remove border and background - only show labels */
            /* Use transform for better performance */
            will-change: transform;
        }

        .face-label {
            position: absolute;
            background: rgba(0, 255, 136, 0.95);
            color: #000;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 136, 1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
            z-index: 100;
            text-align: center;
            line-height: 1.2;
            /* Performance optimizations */
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        .face-label.unknown {
            background: rgba(255, 71, 87, 0.95);
            color: #fff;
            border-color: rgba(255, 71, 87, 1);
        }

        .face-label.high-confidence {
            background: rgba(0, 255, 136, 1);
            border-color: rgba(0, 200, 100, 1);
        }

        .face-label.medium-confidence {
            background: rgba(255, 165, 0, 0.95);
            color: #000;
            border-color: rgba(255, 140, 0, 1);
        }

        .face-label.low-confidence {
            background: rgba(255, 71, 87, 0.95);
            color: #fff;
            border-color: rgba(255, 50, 50, 1);
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Real-Time Face Recognition</h1>
            <p>AI-powered face detection and identification system</p>
        </div>

        <div class="status">
            <span id="status-indicator" class="status-indicator status-disconnected">
                Initializing
            </span>
        </div>

        <div class="video-container">
            <video id="video" class="video-canvas" height="480" autoplay muted></video>
            <canvas id="canvas" class="video-canvas hidden" height="480"></canvas>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span id="faces-detected" class="stat-value">0</span>
                <span class="stat-label">Faces Detected</span>
            </div>
            <div class="stat-item">
                <span id="identified-count" class="stat-value">0</span>
                <span class="stat-label">Identified</span>
            </div>
            <div class="stat-item">
                <span id="fps-counter" class="stat-value">0</span>
                <span class="stat-label">FPS</span>
            </div>
        </div>

        <div id="error-container"></div>
    </div>

    <script src="/static/js/socket.io.min.js"></script>
    <script>
        class OptimizedFaceRecognition {
            constructor() {
                this.socket = null;
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.statusIndicator = document.getElementById('status-indicator');
                this.facesDetectedEl = document.getElementById('faces-detected');
                this.identifiedCountEl = document.getElementById('identified-count');
                this.fpsCounterEl = document.getElementById('fps-counter');
                this.errorContainer = document.getElementById('error-container');

                this.isProcessing = false;
                this.lastFrameTime = 0;
                this.frameCount = 0;
                this.fpsStartTime = Date.now();
                this.currentFaces = [];
                this.frameRate = 15; // Increased from 10 for smoother updates
                this.confidenceThreshold = 0.6;
                this.skipFrames = 0; // Skip processing every N frames for optimization
                this.maxSkipFrames = 2; // Process every 3rd frame only

                this.init();
            }

            async init() {
                try {
                    console.log('Initializing camera...');
                    await this.initCamera();
                    console.log('Camera initialized successfully');
                    
                    console.log('Initializing socket...');
                    this.initSocket();
                    console.log('Socket initialized');
                    
                    console.log('Starting processing...');
                    this.startProcessing();
                    console.log('Processing started');
                } catch (error) {
                    console.error('Initialization error:', error);
                    this.showError('Failed to initialize camera: ' + error.message);
                }
            }

            async initCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 480 }, // Reduced from 640 for faster processing
                            height: { ideal: 360 }, // Reduced from 480 for faster processing
                            frameRate: { ideal: 30 }
                        }
                    });
                    
                    this.video.srcObject = stream;
                    this.video.style.display = 'block';
                    
                    return new Promise((resolve) => {
                        this.video.onloadedmetadata = () => {
                            console.log('Video metadata loaded:', this.video.videoWidth, 'x', this.video.videoHeight);
                            this.video.play();
                            resolve();
                        };
                    });
                } catch (error) {
                    console.error('Camera initialization error:', error);
                    throw error;
                }
            }

            initSocket() {
                this.socket = io('/', {
                    transports: ['websocket'],
                    upgrade: false
                });

                this.socket.on('connect', () => {
                    this.updateStatus('connected', 'Connected');
                    console.log('Connected to video recognition service');
                });

                this.socket.on('disconnect', () => {
                    this.updateStatus('disconnected', 'Disconnected');
                    console.log('Disconnected from video recognition service');
                });

                this.socket.on('face_recognition_result', (data) => {
                    this.handleRecognitionResult(data);
                });

                this.socket.on('error', (error) => {
                    console.error('Socket error:', error);
                    this.showError('Connection error: ' + error.message);
                });
            }

            startProcessing() {
                const processFrame = () => {
                    if (!this.video.videoWidth || this.isProcessing) {
                        requestAnimationFrame(processFrame);
                        return;
                    }

                    const now = Date.now();
                    const timeSinceLastFrame = now - this.lastFrameTime;

                    if (timeSinceLastFrame >= (1000 / this.frameRate)) {
                        this.captureAndProcessFrame();
                        this.lastFrameTime = now;
                        this.updateFPS();
                    }

                    requestAnimationFrame(processFrame);
                };

                processFrame();
            }

            captureAndProcessFrame() {
                if (!this.socket || !this.socket.connected) {
                    return;
                }

                // Skip frames for optimization - only process every 3rd frame
                if (this.skipFrames < this.maxSkipFrames) {
                    this.skipFrames++;
                    // Still update overlays with current face data
                    if (this.currentFaces.length > 0) {
                        this.drawFaceOverlays(this.currentFaces);
                    }
                    return;
                }
                this.skipFrames = 0;

                this.isProcessing = true;
                // Don't update status to 'processing' for every frame - keep it stable

                // Optimized frame capture with lower quality for speed
                this.canvas.width = this.video.videoWidth;
                this.canvas.height = this.video.videoHeight;
                
                // Flip the canvas context to match the flipped video display
                this.ctx.save();
                this.ctx.scale(-1, 1);
                this.ctx.drawImage(this.video, -this.video.videoWidth, 0);
                this.ctx.restore();

                // Convert to base64 with lower quality for faster processing
                const frameData = this.canvas.toDataURL('image/jpeg', 0.6);

                // Send for processing with optimized settings
                this.socket.emit('process_frame', {
                    frame_data: frameData,
                    confidence_threshold: this.confidenceThreshold,
                    detection_model: 'face_recognition_hog', // Faster than hybrid
                    options: {
                        detect_faces: true,
                        identify_faces: true,
                        track_faces: false, // Disable tracking for speed
                        return_embeddings: false
                    }
                });
            }

            handleRecognitionResult(data) {
                this.isProcessing = false;
                // Don't update status back to 'connected' after every frame - keep it stable

                if (data.success && data.faces) {
                    this.currentFaces = data.faces;
                    this.updateStats(data.faces);
                    this.drawFaceOverlays(data.faces);
                } else if (data.error) {
                    console.error('Recognition error:', data.error);
                }
            }

            updateStats(faces) {
                const totalFaces = faces.length;
                const identifiedFaces = faces.filter(face =>
                    face.identification && face.identification.person_id !== 'unknown'
                ).length;

                // Batch DOM updates for better performance
                requestAnimationFrame(() => {
                    this.facesDetectedEl.textContent = totalFaces;
                    this.identifiedCountEl.textContent = identifiedFaces;
                });
            }

            drawFaceOverlays(faces) {
                // Use DocumentFragment for efficient DOM updates
                const fragment = document.createDocumentFragment();
                
                // Clear existing overlays efficiently
                const existingOverlays = document.querySelectorAll('.face-overlay');
                existingOverlays.forEach(el => el.remove());

                faces.forEach((face, index) => {
                    const overlay = this.createFaceOverlayElement(face, index);
                    fragment.appendChild(overlay);
                });

                // Single DOM update
                const videoContainer = this.video.parentElement;
                videoContainer.appendChild(fragment);
            }

            createFaceOverlayElement(face, index) {
                const bbox = face.bbox;
                const identification = face.identification;

                // Calculate position relative to video element
                const videoRect = this.video.getBoundingClientRect();
                const videoWidth = this.video.videoWidth;
                const videoHeight = this.video.videoHeight;

                // bbox format is [x1, y1, x2, y2]
                const [x1, y1, x2, y2] = bbox;
                
                const scaleX = videoRect.width / videoWidth;
                const scaleY = videoRect.height / videoHeight;

                // Since the video is visually flipped but the labels should follow the visual positioning,
                // we use the coordinates directly as they come from the flipped canvas
                const x = x1 * scaleX;
                const y = y1 * scaleY;
                const width = (x2 - x1) * scaleX;
                const height = (y2 - y1) * scaleY;

                // Create overlay element (invisible container)
                const overlay = document.createElement('div');
                overlay.className = 'face-overlay';
                overlay.style.left = x + 'px';
                overlay.style.top = y + 'px';
                overlay.style.width = width + 'px';
                overlay.style.height = height + 'px';

                // Create label with dynamic sizing based on face size
                const label = document.createElement('div');
                label.className = 'face-label';
                
                // Calculate font size based on face size (smaller and more compact)
                const avgFaceSize = (width + height) / 2;
                const fontSize = Math.max(8, Math.min(14, avgFaceSize / 8));
                label.style.fontSize = fontSize + 'px';

                if (identification && identification.person_id !== 'unknown') {
                    const confidence = Math.round(identification.similarity_score * 100);
                    const personName = identification.person_name || 'Identified';
                    label.textContent = `${personName} (${confidence}%)`;
                    
                    // Add confidence-based styling
                    if (confidence >= 80) {
                        label.classList.add('high-confidence');
                    } else if (confidence >= 60) {
                        label.classList.add('medium-confidence');
                    } else {
                        label.classList.add('low-confidence');
                    }
                } else {
                    overlay.classList.add('unknown-face');
                    label.classList.add('unknown');
                    label.textContent = 'Unknown';
                }

                overlay.appendChild(label);
                return overlay;
            }

            updateFPS() {
                this.frameCount++;
                const now = Date.now();
                const timeDiff = now - this.fpsStartTime;

                if (timeDiff >= 1000) {
                    const fps = Math.round((this.frameCount * 1000) / timeDiff);
                    this.fpsCounterEl.textContent = fps;
                    this.frameCount = 0;
                    this.fpsStartTime = now;
                }
            }

            updateStatus(status, text) {
                this.statusIndicator.className = `status-indicator status-${status}`;
                this.statusIndicator.textContent = text;
            }

            showError(message) {
                this.errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
                setTimeout(() => {
                    this.errorContainer.innerHTML = '';
                }, 5000);
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const faceRecognition = new OptimizedFaceRecognition();
            console.log('Face recognition system initialized:', faceRecognition);
        });
    </script>
</body>

</html>
